<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
     rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
     crossorigin="anonymous">
</head>
<body class="bg-light">
    <h1 class="text-center border-black">Student Registration Form</h1>
    <div class="card align-items-center bg-info p-5 justify-content-md-around p-md-5">
        <fieldset>
        <legend>Student details</legend>
        First Name: <input type="text" placeholder="Chathurani">
       Last Name:  <input type="text">
       <br><br>
       Address: <input type="text">
       <br><br>
       Contact Number: <input type="tel">
       <br><br>
       Date of Birth: <input type="date">
       <br><br>
       Age: <input type="number">
       <br><br>
       Gender:  <input type="radio"> Male <input type="radio"> Female
       <br><br>
       Courses: 
       <select name="Courses" id="">
        <option value="">ICM</option>
        <option value="">ICD</option>
       </select>
       <br><br>
       NIC: <input type="text" placeholder="200345322143">
       <br><br>
       Upload NIC PDF: <input type="file">
       <br><br>
       <input type="submit">
       <input type="reset">
    </fieldset>
    </div>

   
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
